<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Research Statement Viewer</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #1a1a1a; color: #fff; }
        h2 { margin-top: 0; }
        #status { padding: 10px; background: #333; border-radius: 4px; margin-bottom: 10px; }
        #log { background: #000; padding: 15px; font-family: monospace; font-size: 11px;
               height: 200px; overflow-y: auto; white-space: pre-wrap; border-radius: 4px; margin-bottom: 10px; }
        .error { color: #f66; }
        .success { color: #6f6; }
        .info { color: #6cf; }
        .warn { color: #fc6; }
        button { padding: 10px 20px; margin-right: 10px; cursor: pointer; font-size: 14px; }
        #pdf-container { background: #fff; margin-top: 10px; }
        #pdf-container embed { width: 100%; height: 700px; }
        .btn-group { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Research Statement - LaTeX Viewer</h2>
    <div id="status">Status: Initializing...</div>
    <div class="btn-group">
        <button onclick="compile()">Compile</button>
        <button onclick="downloadPDF()">Download PDF</button>
        <button onclick="saveTrace()">Save Trace Log</button>
    </div>
    <div id="log"></div>
    <div id="pdf-container"></div>

    <script src="PdfTeXEngine.js"></script>
    <script>
        let engine = null;
        let pdfBlob = null;
        let traceLog = [];

        function log(msg, type = 'info') {
            const time = new Date().toISOString();
            const entry = `[${time}] [${type.toUpperCase()}] ${msg}`;
            traceLog.push(entry);

            const el = document.getElementById('log');
            el.innerHTML += `<span class="${type}">${entry}</span>\n`;
            el.scrollTop = el.scrollHeight;
            console.log(entry);
        }

        function setStatus(text) {
            document.getElementById('status').textContent = 'Status: ' + text;
        }

        // Simplified Research Statement LaTeX (without complex packages)
        const texSource = `\\documentclass[10pt]{article}
\\usepackage[margin=0.85in]{geometry}
\\usepackage[hidelinks]{hyperref}
\\usepackage{enumitem}
\\setlist[itemize]{leftmargin=*, itemsep=2pt, topsep=2pt}

\\setlength{\\parindent}{0pt}
\\setlength{\\parskip}{6pt}

\\begin{document}

\\begin{center}
{\\LARGE \\textbf{From Intent-AI Interaction to Brain-Inspired AI}}\\\\[6pt]
{\\large Research Statement --- Zijian (Jason) Ding}\\\\[3pt]
{\\normalsize University of Maryland, College Park | \\href{mailto:ding@umd.edu}{ding@umd.edu}}
\\end{center}

\\vspace{10pt}

\\section*{Research Vision}

My research investigates how \\textbf{intent}---the latent representation of human goals, constraints, and mental models---can serve as a bridge between human cognition and artificial intelligence.
Rather than treating AI as an automated tool, I study how \\textbf{interaction structures} can externalize human thinking and, in turn, shape the internal reasoning mechanisms of AI systems.
My long-term vision is to develop \\textbf{brain-inspired AI systems} grounded not in neural mimicry, but in \\textbf{functional alignment} with how humans reason, plan, and collaborate.

This vision is organized into three thrusts that connect my past work in Human-Centered AI to a future agenda on cognitively grounded, brain-inspired AI.

\\subsection*{Research Roadmap}
\\begin{itemize}
  \\item \\textbf{Thrust 1:} Intent-oriented Human--AI Interaction
  \\item \\textbf{Thrust 2:} Structured Cognition via Shared Representations
  \\item \\textbf{Thrust 3:} Agentic Systems \\& Interactive World Models
\\end{itemize}

\\textbf{Representative Outputs:} CHI, CSCW, C\\&C, EMNLP, IUI, VL/HCC, CHI PLAY, DIS. Industry impact: Microsoft Copilot demos; patent; product contributions.

\\section*{Thrust 1: Intent-Oriented Human--AI Interaction}

A core limitation of current generative AI systems is that users must translate high-level intentions into low-level prompts.
This translation burden increases cognitive load, reduces controllability, and often produces misalignment between users' goals and model outputs.
My work advances \\textbf{Intent-oriented Interaction} as a paradigm that elevates collaboration from command execution to \\textbf{conceptual alignment}.

\\subsection*{Key idea}
Treat intent as a first-class interaction object: users manipulate goals, constraints, and evaluation criteria through interactive representations, while AI systems respond to these structured signals rather than isolated prompts.

\\subsection*{Methods and outcomes}
I combine empirical studies, system building, and evaluations in real tasks (e.g., writing, ideation, sensemaking) to identify interaction primitives for intent elicitation, revision, and negotiation.

\\textbf{Selected papers:}
\\begin{itemize}
  \\item \\textbf{EMNLP'23 Findings:} Human--LLM interaction through the lens of news headline generation.
  \\item \\textbf{CHI'24:} Example presentation interfaces shape problem solving.
  \\item \\textbf{IUI'24 DC:} Design space of human--AI interaction via task creativity \\& complexity.
  \\item \\textbf{CHI'26:} LLMs as colleagues: multi-agent system for structured professional ideation.
\\end{itemize}

\\section*{Thrust 2: Structuring Cognition with Shared Representations}

Human reasoning is iterative: people generate candidates, compare trade-offs, revise hypotheses, and coordinate across mental models.
Prompt-only interaction collapses this process into a single channel, making it hard to inspect, edit, or accumulate reasoning.
My work designs \\textbf{interactive shared representations} (e.g., diagrams, structured workspaces) that externalize cognition into manipulable artifacts.

These representations act as \\textbf{cognitive scaffolds} (for humans) and \\textbf{coordination substrates} (for AI), enabling mixed-initiative collaboration and reducing hidden-state divergence.

\\textbf{Selected papers:}
\\begin{itemize}
  \\item \\textbf{C\\&C'25:} Interactive shared representation for GenAI-assisted hypothesis exploration.
  \\item \\textbf{IUI'25 Demo:} Companion demo of the shared representation system.
  \\item \\textbf{C\\&C'23:} LLM-assisted cross-domain analogical creativity (honorable mention).
  \\item \\textbf{CHI'21 / CSCW'21 / C\\&C'21:} Scaffolding novice and community design processes.
\\end{itemize}

\\section*{Thrust 3: Agentic Systems and Interactive World Models}

As generative systems become agentic, the key challenge shifts from ``how to prompt'' to ``how to steer and align an evolving system over time.''
In this thrust, I explore agentic workflows and interactive world models where AI systems maintain longer-horizon state representations of goals, consequences, and trade-offs.

These systems create testbeds for cognitively grounded mechanisms: hierarchical planning, counterfactual reasoning, and theory-of-mind-like user modeling---advancing a functional path toward brain-inspired AI.

\\textbf{Selected papers:}
\\begin{itemize}
  \\item \\textbf{CHI'25:} Multimodal agents prompt player actions and show consequences (sustainability).
  \\item \\textbf{VL/HCC'25:} Frontend Diffusion: agentic workflows for self-representation.
  \\item \\textbf{CHI PLAY'26:} Career simulation via interactive world model (under review).
  \\item \\textbf{DIS'26:} LLM interface for iterative revision of trade-offs (under review).
\\end{itemize}

\\section*{Toward Brain-Inspired AI: A Unified Future Agenda}

My long-term agenda treats intent-oriented interaction as both (1) a practical paradigm for collaboration and (2) an empirical lens into cognition that can inspire AI system design.
I focus on: (i) computational intent models as dynamic, hierarchical state; (ii) cognitively grounded agent architectures integrating planning and memory; and (iii) an interaction-to-mechanism pipeline that uses interface traces to evaluate and refine AI cognition.

\\end{document}
`;

        async function init() {
            try {
                log('Creating PdfTeX engine instance...', 'info');
                engine = new PdfTeXEngine();

                log('Loading WebAssembly engine (~1.8MB)...', 'info');
                setStatus('Loading engine...');

                const startTime = Date.now();
                await engine.loadEngine();
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);

                log(`Engine loaded successfully in ${elapsed}s`, 'success');
                setStatus('Ready - Click Compile');

            } catch (err) {
                log('Failed to load engine: ' + err.message, 'error');
                log('Stack: ' + err.stack, 'error');
                setStatus('Engine load failed!');
            }
        }

        async function compile() {
            if (!engine || !engine.isReady()) {
                log('Engine not ready!', 'error');
                return;
            }

            setStatus('Compiling...');
            log('Starting compilation...', 'info');

            try {
                log('Writing main.tex to virtual filesystem...', 'info');
                engine.writeMemFSFile("main.tex", texSource);
                engine.setEngineMainFile("main.tex");

                log('Running PdfTeX (fetching packages from CTAN if needed)...', 'info');
                const startTime = Date.now();

                const result = await engine.compileLaTeX();

                const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
                log(`Compilation finished in ${elapsed}s`, 'info');
                log(`Status code: ${result.status}`, result.status === 0 ? 'success' : 'error');

                // Log compilation output
                if (result.log) {
                    const lines = result.log.split('\n');
                    let errorCount = 0;
                    let warnCount = 0;
                    for (const line of lines) {
                        if (line.includes('!') || line.toLowerCase().includes('error')) {
                            log(line, 'error');
                            errorCount++;
                        } else if (line.toLowerCase().includes('warning')) {
                            warnCount++;
                        }
                    }
                    log(`Errors: ${errorCount}, Warnings: ${warnCount}`, errorCount > 0 ? 'warn' : 'info');
                }

                if (result.pdf && result.pdf.length > 0) {
                    log(`PDF generated: ${result.pdf.length} bytes`, 'success');
                    pdfBlob = new Blob([result.pdf], { type: 'application/pdf' });
                    const url = URL.createObjectURL(pdfBlob);
                    document.getElementById('pdf-container').innerHTML =
                        `<embed src="${url}" type="application/pdf">`;
                    setStatus('Compilation successful!');
                } else {
                    log('No PDF output generated!', 'error');
                    setStatus('Compilation failed - no PDF');

                    // Show full log for debugging
                    if (result.log) {
                        log('=== Full compilation log ===', 'warn');
                        log(result.log.substring(0, 3000), 'info');
                    }
                }

            } catch (err) {
                log('Compilation error: ' + err.message, 'error');
                log('Stack: ' + err.stack, 'error');
                setStatus('Compilation error!');
            }
        }

        function downloadPDF() {
            if (pdfBlob) {
                const url = URL.createObjectURL(pdfBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'research_statement.pdf';
                a.click();
                URL.revokeObjectURL(url);
                log('PDF downloaded', 'success');
            } else {
                log('No PDF available to download', 'warn');
            }
        }

        function saveTrace() {
            const content = traceLog.join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'swiftlatex_trace_' + new Date().toISOString().replace(/[:.]/g, '-') + '.log';
            a.click();
            URL.revokeObjectURL(url);
            log('Trace log saved', 'success');
        }

        window.onload = init;
    </script>
</body>
</html>
